<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smart Parking Dashboard</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #3b82f6;
      --accent-soft: #1d4ed8;
      --text: #f9fafb;
      --muted: #9ca3af;
      --danger: #ef4444;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937 0, #020617 45%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: linear-gradient(145deg, rgba(15,23,42,0.98), rgba(15,23,42,0.9));
      border-radius: 20px;
      padding: 28px 26px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.75),
                  inset 0 0 0 1px rgba(148, 163, 184, 0.08);
      max-width: 520px;
      width: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .title-group h1 {
      font-size: 1.4rem;
      display: flex;
      gap: 8px;
    }

    .title-group p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .status-pill {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      background: rgba(15, 118, 110, 0.15);
      color: var(--success);
      border: 1px solid rgba(45, 212, 191, 0.4);
    }

    .status-pill.full {
      background: rgba(127, 29, 29, 0.15);
      color: var(--danger);
      border-color: rgba(248, 113, 113, 0.5);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }

    .metric-box {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 14px;
      padding: 10px;
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    .metric-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--muted);
    }

    .metric-value {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .bar-bg {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.85);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-soft), var(--accent));
      width: 0%;
      transition: width 0.4s ease;
    }

    .footer {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .connection-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
    }

    .connection-dot.offline {
      background: #f97316;
    }
  </style>
</head>

<body>
<div class="card">

  <div class="header">
    <div class="title-group">
      <h1>🚗 Smart Parking Dashboard</h1>
      <p>Real-time monitoring</p>
    </div>
    <div id="status-pill" class="status-pill">
      <span id="status-text">Connecting...</span>
    </div>
  </div>

  <div class="metrics">
    <div class="metric-box">
      <div class="metric-label">Parked</div>
      <div id="parked" class="metric-value">0</div>
    </div>

    <div class="metric-box">
      <div class="metric-label">Available</div>
      <div id="available" class="metric-value">0</div>
    </div>

    <div class="metric-box">
      <div class="metric-label">Capacity</div>
      <div id="capacity" class="metric-value">0</div>
    </div>
  </div>

  <div class="metric-label">Occupancy</div>
  <div class="bar-bg">
    <div id="bar-fill" class="bar-fill"></div>
  </div>

  <div class="footer">
    <span>Auto updates</span>
    <span><span id="conn-dot" class="connection-dot offline"></span> <span id="conn-text">Connecting</span></span>
  </div>

</div>

<script>
  const wsUrl = "ws://127.0.0.1:8000/ws";

  const parkedEl = document.getElementById("parked");
  const capacityEl = document.getElementById("capacity");
  const availableEl = document.getElementById("available");
  const barFillEl = document.getElementById("bar-fill");
  const statusPill = document.getElementById("status-pill");
  const statusText = document.getElementById("status-text");
  const connDot = document.getElementById("conn-dot");
  const connText = document.getElementById("conn-text");

  function setStatus(parked, capacity) {
    const available = Math.max(capacity - parked, 0);
    const ratio = capacity ? parked / capacity : 0;

    parkedEl.textContent = parked;
    capacityEl.textContent = capacity;
    availableEl.textContent = available;
    barFillEl.style.width = `${ratio * 100}%`;

    if (parked >= capacity) {
      statusPill.classList.add("full");
      statusText.textContent = "FULL";
    } else {
      statusPill.classList.remove("full");
      statusText.textContent = "AVAILABLE";
    }
  }

  function connectWebSocket() {
    const socket = new WebSocket(wsUrl);

    socket.onopen = () => {
      connDot.classList.remove("offline");
      connText.textContent = "Online";
    };

    socket.onmessage = (e) => {
      const data = JSON.parse(e.data);
      setStatus(data.parked, data.capacity);
    };

    socket.onclose = () => {
      connDot.classList.add("offline");
      connText.textContent = "Reconnecting...";
      setTimeout(connectWebSocket, 2000);
    };
  }

  connectWebSocket();
</script>

</body>
</html>
